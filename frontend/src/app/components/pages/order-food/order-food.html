<div class="order-page">

  <!-- IMAGE -->

  <div class="image-section">

    <img [src]="food.imageUrl" [alt]="food.name" class="food-image">

  </div>

  <!-- DETAILS -->

  <div class="details-section">

    <h1>{{ food.name }}</h1>

    <p class="category">
      {{ food.category }}
    </p>

    <p class="description">
      {{ food.description }}
    </p>

    <div class="price">
      ₹{{ food.price }}
    </div>

    <div class="rating">
      ⭐ {{ food.rating }}
    </div>

    <div class="delivery">
      ⏱ Delivery in {{ food.deliveryTime }} mins
    </div>

    <!-- PAYMENT -->

    <div class="payment-box">

      <h2>Choose Payment Method</h2>

      <label>
        <input type="radio" name="payment" [value]="'UPI'" [(ngModel)]="selectedPaymentMethod" checked>
        UPI / Google Pay
      </label>

      <label>
        <input type="radio" [value]="'CARD'" [(ngModel)]="selectedPaymentMethod" name="payment">
        Credit / Debit Card
      </label>

      <label>
        <input type="radio" [value]="'COD'" [(ngModel)]="selectedPaymentMethod" name="payment">
        Cash on Delivery
      </label>

      <label>
        <input type="radio" [value]="'NET_BANKING'" [(ngModel)]="selectedPaymentMethod" name="payment">
        Net Banking
      </label>

    </div>

    <button class="pay-btn" (click)="confirmOrder()">
      ⚡ Pay ₹{{ food.price }}
    </button>

  </div>

</div>
