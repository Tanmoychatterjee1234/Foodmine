<div class="order-page">

  <!-- IMAGE -->

  <div class="image-section">

    <img
      [src]="food.imageUrl"
      [alt]="food.name"
      class="food-image"
    >

  </div>

  <!-- DETAILS -->

  <div class="details-section">

    <h1>{{ food.name }}</h1>

    <p class="category">
      {{ food.category }}
    </p>

    <p class="description">
      {{ food.description }}
    </p>

    <div class="price">
      ₹{{ food.price }}
    </div>

    <div class="rating">
      ⭐ {{ food.rating }}
    </div>

    <div class="delivery">
      ⏱ Delivery in {{ food.deliveryTime }} mins
    </div>

    <!-- PAYMENT -->

    <div class="payment-box">

      <h2>Choose Payment Method</h2>

      <label>
        <input type="radio" name="payment" checked>
        UPI / Google Pay
      </label>

      <label>
        <input type="radio" name="payment">
        Credit / Debit Card
      </label>

      <label>
        <input type="radio" name="payment">
        Cash on Delivery
      </label>

      <label>
        <input type="radio" name="payment">
        Net Banking
      </label>

    </div>

    <button class="pay-btn">
      ⚡ Pay ₹{{ food.price }}
    </button>

  </div>

</div>
